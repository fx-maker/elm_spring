server:
 port: 14000
spring:
 application:
  name: gateway-server
#下面是关于Gateway的配置
 cloud:
  gateway:
   globalcors:
    corsConfigurations:
     '[/**]':
      allowedOrigins: "*"
      allowedHeaders: "*"
      allowedMethods:
      - GET
      - POST
      - PUT
      - DELETE
   routes:
   - id: userServer
     uri: lb://user-server
     predicates:
     - Path=/UserController/**

   - id: foodServer
     uri: lb://food-server
     predicates:
     - Path=/FoodController/**

   - id: businessServer
     uri: lb://business-server
     predicates:
     - Path=/BusinessController/**

   - id: cartServer
     uri: lb://cart-server
     predicates:
     - Path=/CartController/**

   - id: deliveryaddressServer
     uri: lb://deliveryaddress-server
     predicates:
     - Path=/DeliveryAddressController/**

   - id: ordersServer
     uri: lb://orders-server
     predicates:
     - Path=/OrdersController/**

   - id: walletServer
     uri: lb://wallet-server
     predicates:
     - Path=/WalletController/**

   - id: pointsServer
     uri: lb://points-server
     predicates:
     - Path=/PointsController/**

#eureka配置
eureka:
 client:
  service-url:
   defaultZone: http://eurekaServer13000:13000/eureka/,http://eurekaServer13001:13001/eureka/
 instance:
  prefer-ip-address: true #使用ip地址向eureka server进行注册
  instance-id: ${spring.cloud.client.ip-address}:${server.port}
  lease-renewal-interval-in-seconds: 5 #续约间隔时间

  lease-expiration-duration-in-seconds: 15 #续约到期时间